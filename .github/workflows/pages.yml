# Deploys the repo to GitHub Pages so website/, examples/, and the demo assets are live.
# ONE-TIME SETUP: repo Settings → Pages → Source: "GitHub Actions". Then every push to
# main publishes to https://ardamoustafa1.github.io/DesignOS/
name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
