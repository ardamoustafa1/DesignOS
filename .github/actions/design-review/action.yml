name: DesignOS Review
description: Deterministic UI/design-risk review for AI-generated interfaces.
author: Arda Moustafa

inputs:
  path:
    description: File or directory to review.
    required: false
    default: "."
  min-score:
    description: Minimum acceptable six-dimension gate score.
    required: false
    default: "95"
  fail-under-min:
    description: Whether to fail the workflow when the score is below min-score.
    required: false
    default: "true"
  json:
    description: Also write the JSON report to designos-review.json.
    required: false
    default: "true"
  comment:
    description: Create or update a sticky pull request comment with the Markdown report.
    required: false
    default: "true"
  github-token:
    description: GitHub token with pull-requests:write permission when comment=true.
    required: false
    default: ""

outputs:
  report-json:
    description: Path to the JSON report, when json=true.
    value: ${{ steps.review.outputs.report-json }}
  report-markdown:
    description: Path to the Markdown report.
    value: ${{ steps.review.outputs.report-markdown }}
  score:
    description: Overall six-dimension gate score.
    value: ${{ steps.review.outputs.score }}

runs:
  using: composite
  steps:
    - id: review
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        CLI="$GITHUB_ACTION_PATH/../../../bin/designos.js"
        FLAGS=("--min" "${{ inputs.min-score }}" "--no-fail")

        node "$CLI" review "${{ inputs.path }}" "${FLAGS[@]}" --json > designos-review.json
        node "$CLI" review "${{ inputs.path }}" "${FLAGS[@]}" > designos-review.md
        cat designos-review.md

        if [ "${{ inputs.json }}" = "true" ]; then
          echo "report-json=designos-review.json" >> "$GITHUB_OUTPUT"
        fi
        echo "report-markdown=designos-review.md" >> "$GITHUB_OUTPUT"

        SCORE="$(node -e "const r=require('./designos-review.json'); console.log(r.summary.overall)")"
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"

        if [ "${{ inputs.comment }}" = "true" ] && [ -n "${GH_TOKEN:-}" ] && [ -n "${GITHUB_EVENT_PATH:-}" ]; then
          node <<'NODE'
        const fs = require('fs');
        const https = require('https');

        const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
        const pr = event.pull_request && event.pull_request.number;
        const repo = process.env.GITHUB_REPOSITORY || '';
        const token = process.env.GH_TOKEN || '';
        if (!pr || !repo || !token) process.exit(0);

        const [owner, name] = repo.split('/');
        const marker = '<!-- designos-review-action -->';
        const report = fs.readFileSync('designos-review.md', 'utf8');
        const body = `${marker}\n${report}\n\n_Run locally with \`node DesignOS/bin/designos.js review <path> --min ${{ inputs.min-score }}\`._`;

        function request(method, path, payload) {
          return new Promise((resolve, reject) => {
            const data = payload ? JSON.stringify(payload) : '';
            const req = https.request({
              hostname: 'api.github.com',
              path,
              method,
              headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                'User-Agent': 'designos-review-action',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            }, res => {
              let chunks = '';
              res.on('data', d => { chunks += d; });
              res.on('end', () => {
                const parsed = chunks ? JSON.parse(chunks) : {};
                if (res.statusCode >= 400) reject(new Error(`${method} ${path} -> ${res.statusCode}: ${chunks}`));
                else resolve(parsed);
              });
            });
            req.on('error', reject);
            if (data) req.write(data);
            req.end();
          });
        }

        (async () => {
          const comments = await request('GET', `/repos/${owner}/${name}/issues/${pr}/comments?per_page=100`);
          const previous = comments.find(comment => comment.body && comment.body.includes(marker));
          if (previous) {
            await request('PATCH', `/repos/${owner}/${name}/issues/comments/${previous.id}`, { body });
          } else {
            await request('POST', `/repos/${owner}/${name}/issues/${pr}/comments`, { body });
          }
        })().catch(error => {
          console.error(error.message);
          process.exit(1);
        });
        NODE
        fi

        if [ "${{ inputs.fail-under-min }}" = "true" ] && [ "$SCORE" -lt "${{ inputs.min-score }}" ]; then
          echo "DesignOS review score $SCORE is below required minimum ${{ inputs.min-score }}."
          exit 1
        fi
